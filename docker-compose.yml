services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: ["redis-server", "--notify-keyspace-events", "Ex"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=kinesis,dynamodb,s3
      - AWS_DEFAULT_REGION=ap-southeast-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  localstack-init:
    image: amazon/aws-cli:latest
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-southeast-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        aws --endpoint-url http://localstack:4566 kinesis create-stream --stream-name need-a-sidekick-events --shard-count 1
        aws --endpoint-url http://localstack:4566 dynamodb create-table --table-name activity_metrics --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE --billing-mode PAY_PER_REQUEST
        aws --endpoint-url http://localstack:4566 s3 mb s3://need-a-sidekick-archive
        echo "LocalStack init complete."
    depends_on:
      localstack:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000

  dashboard:
    build:
      context: ./dashboard
      target: dev
    ports:
      - "5174:5174"
    volumes:
      - ./dashboard/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
